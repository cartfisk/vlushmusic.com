<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if not .IsHome }}{{ .Title }} — {{ end }}{{ site.Title }}</title>
  <meta name="og:site_name" content="{{ site.Title }}" />
  <meta name="og:title" content="{{ site.Title }}" />
  <meta name="og:url" content="{{ site.BaseURL }}" />
  <meta name="og:type" content="website" />
  <meta name="twitter:title" content="{{ site.Title }}" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/webp" href="/img/favicon.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet" />
  {{ $css := resources.Get "css/main.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" />
  {{ block "head_extra" . }}{{ end }}
</head>
<body>
  <header class="site-header">
    <nav class="nav-inner">
      <a href="/" class="site-title">{{ site.Title }}</a>
      <ul class="nav-links">
        {{ range site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </header>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="site-footer">
    <div class="social-links">
      <a href="https://www.instagram.com/vlushairlines/" target="_blank" rel="noopener" aria-label="Instagram">
        <img src="/icons/instagram.svg" width="20" height="20" alt="Instagram" />
      </a>
      <a href="https://twitter.com/vlush" target="_blank" rel="noopener" aria-label="X">
        <img src="/icons/x.svg" width="20" height="20" alt="X" />
      </a>
      <a href="https://open.spotify.com/artist/5gGq4ZD0IhBtwRI9zaeLoE" target="_blank" rel="noopener" aria-label="Spotify">
        <img src="/icons/spotify.svg" width="20" height="20" alt="Spotify" />
      </a>
      <a href="https://music.apple.com/us/artist/vlush/1205084532" target="_blank" rel="noopener" aria-label="Apple Music">
        <img src="/icons/applemusic.svg" width="20" height="20" alt="Apple Music" />
      </a>
      <a href="http://soundcloud.com/vlushmusic" target="_blank" rel="noopener" aria-label="SoundCloud">
        <img src="/icons/soundcloud.svg" width="20" height="20" alt="SoundCloud" />
      </a>
      <a href="https://www.youtube.com/watch?v=nKlorukGBa0&list=PLaHgPKnRaDromau-7TbhzCsUPXKUWYb9H" target="_blank" rel="noopener" aria-label="YouTube">
        <img src="/icons/youtube.svg" width="20" height="20" alt="YouTube" />
      </a>
    </div>
  </footer>
  {{ block "foot_extra" . }}{{ end }}
</body>
</html>
