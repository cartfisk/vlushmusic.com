{{ define "main" }}
<div class="download-page">
  <div style="text-align:center; max-width:540px; margin:0 auto; padding:40px 20px;">
    <p style="font-size:32px; font-weight:700; font-family:'Courier New', monospace; color:#3C4858; margin-bottom:8px;">{{ .Params.track_title }}</p>
    <p style="font-size:22px; font-family:'Courier New', monospace; color:#3C4858; margin-bottom:32px;">{{ .Params.track_artist }}</p>
    <a href="{{ .Params.audio_file }}" download style="display:inline-block; font-size:16px; font-weight:700; font-family:Helvetica, sans-serif; color:#FFFFFF; background-color:#3E4857; border-radius:3px; padding:12px 24px; text-decoration:none;">DOWNLOAD</a>
  </div>
</div>
{{ end }}
