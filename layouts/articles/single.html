{{ define "head_extra" }}
{{ partial "articles-styles.html" . }}
{{ end }}

{{ define "main" }}
<div class="article-body">
  <h2>{{ .Title }}</h2>
  <p>by <strong><em>{{ .Params.author }}</em></strong>{{ if not .Date.IsZero }} - {{ .Date.Format "January 2, 2006" }} <small><em>(updated {{ .Lastmod.Format "1/2/06" }})</em></small>{{ end }}</p>
  <hr>
  {{ .Content }}
</div>
{{ end }}
