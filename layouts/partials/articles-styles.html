<style>
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-italic.woff2') format('woff2');
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-bold-italic.woff2') format('woff2');
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: BookerlyDisplay;
    src: url('/fonts/bookerly-display-regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: BookerlyDisplay;
    src: url('/fonts/bookerly-display-bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  body {
    background-color: #fff;
    color: #111;
  }
  .site-header,
  .site-footer {
    background-color: #fff;
    color: #111;
  }
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .article-sticky-bar {
    position: sticky;
    top: var(--header-height, 73px);
    z-index: 99;
    background-color: #fff;
    opacity: 95%;
    padding-bottom: 6px;
    border-bottom: 1px solid #f5f5f5;
  }

  .site-header a,
  .site-footer a {
    color: #111;
  }
  .article-list {
    line-height: 2em;
    font-size: 1.2em;
  }
  
  .article-list-title {
    font-family: BookerlyDisplay, Georgia, 'Times New Roman', serif;
  }

  .article-list-date {
    padding-left: .2rem;
    color: #444;
  }

  .article-list-item strong {
    font-weight: bold;
  }

  .article-body {
    /* max-width: 680px; */
    /* padding: 0 var(--site-gutter); */
    font-family: Bookerly, Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    line-height: 1.75;
    text-align: left;
    opacity: 1;
  }
  .article-body .footnotes {
    font-size: .9rem;
  }
  .article-body strong {
    font-weight: 700;
  }
  .article-body a {
    font-weight: 700;
    text-decoration: underline;
  }
  .article-body h1,
  .article-body h2,
  .article-body h3,
  .article-body h4 {
    font-family: BookerlyDisplay, Georgia, 'Times New Roman', serif;
    text-align: left;
  }
  {{ if .Params.collapsible }}
  .article-content h2,
  .article-content h3,
  .article-content h4 {
    cursor: pointer;
    user-select: none;
  }
  .article-content h2::before,
  .article-content h3::before,
  .article-content h4::before {
    content: '▾';
    display: inline-block;
    margin-right: 0.35em;
    font-size: 0.75em;
    vertical-align: middle;
    transition: transform 0.2s ease;
    transform-origin: center;
  }
  .article-content h2.collapsed::before,
  .article-content h3.collapsed::before,
  .article-content h4.collapsed::before {
    transform: rotate(-90deg);
  }
  .collapsible-section {
    overflow: hidden;
    transition: max-height 0.25s ease;
  }
  {{ end }}
  .article-body table {
    border-collapse: collapse;
    width: auto;
    margin: 1.5em 0;
  }
  .article-body th,
  .article-body td {
    border: 1px solid #ddd;
    padding: 0.5em 0.75em;
    text-align: left;
  }
  .article-body th {
    font-family: BookerlyDisplay, Georgia, 'Times New Roman', serif;
    font-weight: 700;
    background-color: #f5f5f5;
  }
  .article-body tr:nth-child(even) {
    background-color: #fafafa;
  }
</style>
{{ if .Params.collapsible }}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var content = document.querySelector('.article-content');
    if (!content) return;

    function getLevel(el) {
      return parseInt(el.tagName[1], 10);
    }

    // Process deepest headings first so nested sections are wrapped before their parents
    [4, 3, 2].forEach(function (level) {
      content.querySelectorAll('h' + level).forEach(function (heading) {
        var siblings = [];
        var next = heading.nextElementSibling;
        while (next) {
          if (/^H[1-6]$/.test(next.tagName) && getLevel(next) <= level) break;
          siblings.push(next);
          next = next.nextElementSibling;
        }
        if (!siblings.length) return;

        var section = document.createElement('div');
        section.className = 'collapsible-section';
        siblings[0].parentNode.insertBefore(section, siblings[0]);
        siblings.forEach(function (el) { section.appendChild(el); });

        heading.addEventListener('click', function () {
          if (heading.classList.contains('collapsed')) {
            heading.classList.remove('collapsed');
            section.style.maxHeight = section.scrollHeight + 'px';
            section.addEventListener('transitionend', function once() {
              section.removeEventListener('transitionend', once);
              if (!heading.classList.contains('collapsed')) {
                section.style.maxHeight = 'none';
              }
            });
          } else {
            section.style.maxHeight = section.scrollHeight + 'px';
            section.getBoundingClientRect(); // force reflow before transitioning
            heading.classList.add('collapsed');
            section.style.maxHeight = '0';
          }
        });
      });
    });
  });
</script>
{{ end }}
