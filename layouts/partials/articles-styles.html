<style>
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-italic.woff2') format('woff2');
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: Bookerly;
    src: url('/fonts/bookerly-bold-italic.woff2') format('woff2');
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: BookerlyDisplay;
    src: url('/fonts/bookerly-display-regular.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: BookerlyDisplay;
    src: url('/fonts/bookerly-display-bold.woff2') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  body {
    background-color: #fff;
    color: #111;
  }
  .site-header,
  .site-footer {
    background-color: #fff;
    color: #111;
  }
  .site-header a,
  .site-footer a {
    color: #111;
  }
  .article-list {
    line-height: 2em;
    font-size: 1.2em;
  }
  
  .article-list-title {
    font-family: BookerlyDisplay, Georgia, 'Times New Roman', serif;
  }

  .article-list-date {
    padding-left: .2rem;
    color: #444;
  }

  .article-list-item strong {
    font-weight: bold;
  }

  .article-body {
    /* max-width: 680px; */
    /* padding: 0 var(--site-gutter); */
    font-family: Bookerly, Georgia, 'Times New Roman', serif;
    font-size: 1.1rem;
    line-height: 1.75;
    text-align: left;
    opacity: 1;
  }
  .article-body .footnotes {
    font-size: .9rem;
  }
  .article-body strong {
    font-weight: 700;
  }
  .article-body a {
    font-weight: 700;
    text-decoration: underline;
  }
  .article-body h1,
  .article-body h2,
  .article-body h3,
  .article-body h4 {
    font-family: BookerlyDisplay, Georgia, 'Times New Roman', serif;
    text-align: left;
  }
  .article-body table {
    border-collapse: collapse;
    width: auto;
    margin: 1.5em 0;
  }
  .article-body th,
  .article-body td {
    border: 1px solid #ddd;
    padding: 0.5em 0.75em;
    text-align: left;
  }
  .article-body th {
    font-family: BookerlyDisplay, Georgia, 'Times New Roman', serif;
    font-weight: 700;
    background-color: #f5f5f5;
  }
  .article-body tr:nth-child(even) {
    background-color: #fafafa;
  }
